name: Deploy Worker

on:
  workflow_dispatch:

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Validate and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Worker
        run: pnpm typecheck:worker

      - name: Test Worker
        run: pnpm test:worker

      - name: Verify Cloudflare authentication
        run: pnpm --filter worker exec wrangler whoami

      - name: Deploy Worker to production
        run: pnpm --filter worker exec wrangler deploy --env production
