name = "bap-shop-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "bap-shop-db"
database_id = "055838e4-ec0c-4bca-92b8-9fd3c259b78b"

[[r2_buckets]]
binding = "R2"
bucket_name = "bap-shop-images"

[[kv_namespaces]]
binding = "KV"
id = "1a697ad608d9445aafbcb89dbda3a94e"



[triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
  "0 3 * * *",
  "0 4 * * SUN",
]

[env.production]
vars = { ENVIRONMENT = "production", STORE_DOMAIN = "bap-shop-store.pages.dev", ADMIN_DOMAIN = "bap-shop-admin.pages.dev", R2_PUBLIC_DOMAIN = "pub-470a5675dc7d4e9d949688372b59b080.r2.dev" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "bap-shop-db"
database_id = "055838e4-ec0c-4bca-92b8-9fd3c259b78b"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "bap-shop-images"

[[env.production.kv_namespaces]]
binding = "KV"
id = "1a697ad608d9445aafbcb89dbda3a94e"
