name = "bap-shop-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# =========================================================
# BASE DE DATOS D1
# =========================================================
[[d1_databases]]
binding = "DB"
database_name = "bap-shop-db"
database_id = "055838e4-ec0c-4bca-92b8-9fd3c259b78b"

# =========================================================
# ALMACENAMIENTO R2 (imágenes + snapshots)
# =========================================================
[[r2_buckets]]
binding = "R2"
bucket_name = "bap-shop-images"

# =========================================================
# KV (rate limiting)
# =========================================================
[[kv_namespaces]]
binding = "KV"
id = "1a697ad608d9445aafbcb89dbda3a94e"

# =========================================================
# VARIABLES DE ENTORNO (no sensibles)
# =========================================================
[vars]
ENVIRONMENT = "development"
R2_PUBLIC_DOMAIN = "assets.bapshop.com"
STORE_DOMAIN = "bapshop.com"
ADMIN_DOMAIN = "admin.bapshop.com"

# =========================================================
# CRON TRIGGERS
# =========================================================
[triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
  "0 3 * * *",
  "0 4 * * 0"
]

# =========================================================
# ENTORNO DE PRODUCCIÓN
# (completar con IDs reales de producción al desplegar)
# =========================================================
[env.production]
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "bap-shop-db"
database_id = "REPLACE_WITH_PROD_ID"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "bap-shop-images"

[[env.production.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_PROD_ID"
